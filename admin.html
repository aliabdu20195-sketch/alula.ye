<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم مدير المدرسة | مدارس العلا الأهلية النموذجية</title>
<style>
:root{--primary:#0d47a1;--primary-light:#1976d2;--primary-dark:#0a3575;--secondary:#ff9800;--accent:#00bcd4;--success:#4caf50;--danger:#f44336;--warning:#ff9800;--bg-light:#f8fafc;--bg-white:#fff;--text-dark:#1a1a2e;--text-muted:#64748b;--shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px -1px rgba(0,0,0,0.1);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.1);--shadow-xl:0 20px 25px -5px rgba(0,0,0,0.1);--radius:12px;--transition:all .3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg-light);color:var(--text-dark);line-height:1.7;overflow-x:hidden}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg-light)}
::-webkit-scrollbar-thumb{background:var(--primary-light);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--primary)}
.login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);display:flex;align-items:center;justify-content:center;z-index:10000;transition:opacity .5s ease,visibility .5s ease}
.login-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-box{background:var(--bg-white);padding:50px 40px;border-radius:var(--radius);box-shadow:var(--shadow-xl);width:100%;max-width:420px;text-align:center}
.login-box .logo{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;color:#fff}
.login-box h2{color:var(--primary);font-size:24px;margin-bottom:8px}
.login-box p{color:var(--text-muted);margin-bottom:30px;font-size:14px}
.login-box .form-group{margin-bottom:20px;text-align:right}
.login-box label{display:block;margin-bottom:8px;font-weight:600;color:var(--text-dark);font-size:14px}
.login-box input{width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;font-family:inherit;transition:var(--transition)}
.login-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(13,71,161,0.1)}
.login-box button{width:100%;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:#fff;border:none;padding:16px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:var(--transition);margin-top:10px}
.login-box button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(13,71,161,0.3)}
.login-error{color:var(--danger);font-size:14px;margin-top:15px;display:none}
.login-error.show{display:block}
.admin-layout{display:none;min-height:100vh}
.admin-layout.active{display:flex}
.sidebar{width:280px;background:linear-gradient(180deg,var(--primary-dark) 0%,var(--primary) 100%);color:#fff;position:fixed;top:0;right:0;bottom:0;z-index:1000;overflow-y:auto;transition:var(--transition)}
.sidebar-header{padding:30px 20px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-header .logo{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:28px}
.sidebar-header h3{font-size:18px;margin-bottom:5px}
.sidebar-header p{font-size:12px;opacity:.7}
.sidebar-nav{padding:20px 0}
.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:15px 25px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:15px;font-weight:600;transition:var(--transition);border-right:3px solid transparent}
.sidebar-nav a:hover,.sidebar-nav a.active{background:rgba(255,255,255,0.1);color:#fff;border-right-color:var(--secondary)}
.sidebar-nav a .icon{font-size:20px;width:30px;text-align:center}
.sidebar-footer{position:absolute;bottom:0;left:0;right:0;padding:20px;border-top:1px solid rgba(255,255,255,0.1)}
.sidebar-footer button{width:100%;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
.sidebar-footer button:hover{background:var(--danger);border-color:var(--danger)}
.main-content{flex:1;margin-right:280px;padding:30px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid #e2e8f0}
.top-bar h1{font-size:24px;color:var(--primary)}
.top-bar .user-info{display:flex;align-items:center;gap:15px}
.top-bar .user-avatar{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700}
.top-bar .user-name{font-weight:700;color:var(--text-dark)}
.top-bar .user-role{font-size:12px;color:var(--text-muted)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px}
.stat-card{background:var(--bg-white);padding:25px;border-radius:var(--radius);box-shadow:var(--shadow-md);display:flex;align-items:center;gap:15px;transition:var(--transition)}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.stat-card .stat-icon{width:55px;height:55px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px}
.stat-card .stat-icon.blue{background:rgba(13,71,161,0.1)}
.stat-card .stat-icon.orange{background:rgba(255,152,0,0.1)}
.stat-card .stat-icon.green{background:rgba(76,175,80,0.1)}
.stat-card .stat-icon.red{background:rgba(244,67,54,0.1)}
.stat-card .stat-details h4{font-size:14px;color:var(--text-muted);margin-bottom:5px}
.stat-card .stat-details .number{font-size:28px;font-weight:800;color:var(--text-dark)}
.content-section{display:none;animation:fadeIn .4s ease}
.content-section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
.section-header h2{font-size:20px;color:var(--primary)}
.card{background:var(--bg-white);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:30px;margin-bottom:25px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;padding-bottom:15px;border-bottom:1px solid #e2e8f0}
.card-header h3{font-size:18px;color:var(--text-dark)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:var(--transition);border:none;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(13,71,161,0.3)}
.btn-success{background:linear-gradient(135deg,var(--success),#66bb6a);color:#fff}
.btn-success:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(76,175,80,0.3)}
.btn-danger{background:linear-gradient(135deg,var(--danger),#ef5350);color:#fff}
.btn-danger:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(244,67,54,0.3)}
.btn-secondary{background:#e2e8f0;color:var(--text-dark)}
.btn-secondary:hover{background:#cbd5e1}
.upload-zone{border:3px dashed #cbd5e1;border-radius:var(--radius);padding:50px 30px;text-align:center;transition:var(--transition);cursor:pointer;background:var(--bg-light)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:rgba(13,71,161,0.02)}
.upload-zone .upload-icon{font-size:60px;margin-bottom:15px;display:block}
.upload-zone h4{font-size:18px;color:var(--text-dark);margin-bottom:10px}
.upload-zone p{color:var(--text-muted);font-size:14px}
.upload-zone input[type="file"]{display:none}
.image-preview-area{margin-top:25px}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
.preview-item{position:relative;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);aspect-ratio:4/3}
.preview-item img{width:100%;height:100%;object-fit:cover;transition:var(--transition)}
.preview-item:hover img{transform:scale(1.05)}
.preview-item .remove-btn{position:absolute;top:8px;left:8px;width:30px;height:30px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:var(--transition);opacity:0}
.preview-item:hover .remove-btn{opacity:1}
.preview-item .remove-btn:hover{transform:scale(1.1)}
.preview-item .image-info{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:15px 10px 10px;color:#fff;font-size:12px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
.gallery-item{background:var(--bg-white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);transition:var(--transition)}
.gallery-item:hover{transform:translateY(-5px);box-shadow:var(--shadow-xl)}
.gallery-item .image-wrapper{position:relative;aspect-ratio:4/3;overflow:hidden}
.gallery-item .image-wrapper img{width:100%;height:100%;object-fit:cover;transition:var(--transition)}
.gallery-item:hover .image-wrapper img{transform:scale(1.1)}
.gallery-item .image-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;gap:10px;opacity:0;transition:var(--transition)}
.gallery-item:hover .image-overlay{opacity:1}
.gallery-item .image-overlay button{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:var(--transition)}
.gallery-item .image-overlay .view-btn{background:#fff;color:var(--primary)}
.gallery-item .image-overlay .delete-btn{background:var(--danger);color:#fff}
.gallery-item .image-overlay button:hover{transform:scale(1.1)}
.gallery-item .image-details{padding:15px}
.gallery-item .image-details h4{font-size:15px;margin-bottom:5px;color:var(--text-dark)}
.gallery-item .image-details p{font-size:12px;color:var(--text-muted)}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;font-weight:600;color:var(--text-dark);font-size:14px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:15px;font-family:inherit;transition:var(--transition);background:var(--bg-light)}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(13,71,161,0.1)}
.form-group textarea{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.toast-container{position:fixed;top:20px;left:20px;z-index:10001;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--bg-white);color:var(--text-dark);padding:16px 24px;border-radius:10px;box-shadow:var(--shadow-xl);display:flex;align-items:center;gap:12px;font-weight:600;animation:toastSlide .4s cubic-bezier(.68,-.55,.265,1.55);border-right:4px solid var(--success)}
.toast.error{border-right-color:var(--danger)}
.toast.warning{border-right-color:var(--warning)}
@keyframes toastSlide{from{opacity:0;transform:translateX(-100px)}to{opacity:1;transform:translateX(0)}}
.toast .toast-icon{font-size:24px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:10002;opacity:0;visibility:hidden;transition:var(--transition)}
.modal-overlay.active{opacity:1;visibility:visible}
.modal{background:var(--bg-white);border-radius:var(--radius);box-shadow:var(--shadow-xl);width:90%;max-width:600px;max-height:90vh;overflow-y:auto;transform:scale(.9);transition:var(--transition)}
.modal-overlay.active .modal{transform:scale(1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:25px 30px;border-bottom:1px solid #e2e8f0}
.modal-header h3{font-size:20px;color:var(--primary)}
.modal-header .close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-muted);transition:var(--transition)}
.modal-header .close-btn:hover{color:var(--danger)}
.modal-body{padding:30px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:20px 30px;border-top:1px solid #e2e8f0}
.empty-state{text-align:center;padding:60px 20px}
.empty-state .icon{font-size:80px;margin-bottom:20px;opacity:.3}
.empty-state h4{font-size:20px;color:var(--text-dark);margin-bottom:10px}
.empty-state p{color:var(--text-muted);margin-bottom:25px}
.progress-bar{width:100%;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:15px}
.progress-bar .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:4px;transition:width .3s ease;width:0%}
.image-viewer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10003;opacity:0;visibility:hidden;transition:var(--transition)}
.image-viewer-overlay.active{opacity:1;visibility:visible}
.image-viewer-overlay img{max-width:90%;max-height:90vh;border-radius:var(--radius);box-shadow:var(--shadow-xl)}
.image-viewer-overlay .close-viewer{position:absolute;top:20px;left:20px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.1);color:#fff;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.image-viewer-overlay .close-viewer:hover{background:var(--danger)}
@media(max-width:1024px){.sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-right:0}.form-row{grid-template-columns:1fr}}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr}.gallery-grid{grid-template-columns:1fr}.top-bar{flex-direction:column;gap:15px;text-align:center}}
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="login-screen" id="loginScreen">
<div class="login-box">
<div class="logo">🔐</div>
<h2>لوحة تحكم المدير</h2>
<p>مدارس العلا الأهلية النموذجية</p>
<div class="form-group"><label>اسم المستخدم</label><input type="text" id="username" placeholder="أدخل اسم المستخدم" value="admin"></div>
<div class="form-group"><label>كلمة المرور</label><input type="password" id="password" placeholder="أدخل كلمة المرور"></div>
<button onclick="login()">🔓 تسجيل الدخول</button>
<div class="login-error" id="loginError">❌ اسم المستخدم أو كلمة المرور غير صحيحة!</div>
<p style="margin-top:20px;font-size:12px;color:var(--text-muted)">🔑 اسم المستخدم: <strong>admin</strong> | كلمة المرور: <strong>123456</strong></p>
</div>
</div>
<div class="admin-layout" id="adminLayout">
<aside class="sidebar" id="sidebar">
<div class="sidebar-header">
<div class="logo">🏫</div>
<h3>مدارس العلا</h3>
<p>لوحة تحكم المدير</p>
</div>
<nav class="sidebar-nav">
<a href="#" class="active" onclick="showSection('dashboard',this)"><span class="icon">📊</span><span>الرئيسية</span></a>
<a href="#" onclick="showSection('upload',this)"><span class="icon">⬆️</span><span>رفع الصور</span></a>
<a href="#" onclick="showSection('gallery',this)"><span class="icon">🖼️</span><span>معرض الصور</span></a>
<a href="#" onclick="showSection('settings',this)"><span class="icon">⚙️</span><span>إعدادات الموقع</span></a>
</nav>
<div class="sidebar-footer"><button onclick="logout()"><span>🚪</span><span>تسجيل الخروج</span></button></div>
</aside>
<main class="main-content">
<div class="top-bar"><h1 id="pageTitle">📊 لوحة التحكم</h1><div class="user-info"><div><div class="user-name">مدير المدرسة</div><div class="user-role">مدير النظام</div></div><div class="user-avatar">👤</div></div></div>
